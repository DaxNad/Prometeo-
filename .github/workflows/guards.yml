name: Guards

permissions:
  contents: read

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  run-guards:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps (backend)
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt pytest

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend deps
        working-directory: frontend
        run: |
          npm install --no-fund --no-audit

      - name: Make guard scripts executable
        run: |
          chmod +x scripts/run_all_guards.sh || true
          chmod +x backend/scripts/run_guards.sh || true
          chmod +x frontend/scripts/guard_tl_board.sh || true

      - name: Run all guards (backend + frontend)
        run: |
          bash scripts/run_all_guards.sh
