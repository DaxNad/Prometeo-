name: Guards

permissions:
  contents: read

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  run-guards:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONPATH: backend
      PYTEST_ADDOPTS: -m "not e2e"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine changed files (PR)
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          BASE_SHA='${{ github.event.pull_request.base.sha }}'
          HEAD_SHA='${{ github.event.pull_request.head.sha }}'
          echo "BASE_SHA=$BASE_SHA"
          echo "HEAD_SHA=$HEAD_SHA"
          git fetch --no-tags --depth=1 origin "$BASE_SHA" "$HEAD_SHA"
          git diff --name-only "$BASE_SHA" "$HEAD_SHA" > changed_files.txt || true
          echo "Changed files:"; cat changed_files.txt || true

      - name: Classify guard scope (PR)
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          FULL_BACKEND_REGEX='^(backend/app/smf/|backend/app/agent_mod/|backend/app/api/|backend/app/models/|backend/app/services/|backend/tests/|backend/requirements\.txt|backend/pytest\.ini)'

          if grep -E "$FULL_BACKEND_REGEX" changed_files.txt >/dev/null 2>&1; then
            echo "BACKEND_GUARDS=1" >> "$GITHUB_ENV"
          else
            echo "BACKEND_GUARDS=0" >> "$GITHUB_ENV"
          fi

          if grep -E '^backend/' changed_files.txt >/dev/null 2>&1; then
            if grep -E '^backend/' changed_files.txt | grep -Ev '^(backend/app/atlas_engine/|backend/app/atlas_engine/tests/)' >/dev/null 2>&1; then
              echo "ATLAS_ONLY_BACKEND=0" >> "$GITHUB_ENV"
            else
              echo "ATLAS_ONLY_BACKEND=1" >> "$GITHUB_ENV"
            fi
          else
            echo "ATLAS_ONLY_BACKEND=0" >> "$GITHUB_ENV"
          fi

      - name: Default guard scope (push)
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          echo "BACKEND_GUARDS=1" >> "$GITHUB_ENV"
          echo "ATLAS_ONLY_BACKEND=0" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps (backend)
        run: |
          if [ "${BACKEND_GUARDS}" = "1" ]; then
            python -m pip install --upgrade pip
            pip install -r backend/requirements.txt pytest
          else
            echo "Backend guard scope not required for this change set: skip backend deps"
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install frontend deps
        working-directory: frontend
        run: |
          npm install --no-fund --no-audit

      - name: Make guard scripts executable
        run: |
          chmod +x scripts/run_all_guards.sh || true
          chmod +x backend/scripts/run_guards.sh || true
          chmod +x frontend/scripts/guard_tl_board.sh || true

      - name: Backend guards (conditional)
        run: |
          if [ "${BACKEND_GUARDS}" = "1" ]; then
            bash backend/scripts/run_guards.sh
          elif [ "${ATLAS_ONLY_BACKEND}" = "1" ]; then
            echo "ATLAS-only backend PR detected: skip legacy backend guards"
          else
            echo "No guarded backend surface changed: skip backend guards"
          fi

      - name: Frontend UI structural guard
        run: |
          echo "==> TL Board structural guard"
          grep -RqiE 'TL Board|TLBoard' frontend/src
          grep -RqiE 'sequenza consigliata|ranking|sequence' frontend/src
          grep -RqiE 'carico postazioni|machine load|load panel' frontend/src
          echo "[PASS] TL Board guard"
