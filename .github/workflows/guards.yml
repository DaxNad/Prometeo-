name: Guards

permissions:
  contents: read

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  run-guards:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONPATH: backend
      PYTEST_ADDOPTS: -m "not e2e"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine changed files (PR)
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          BASE_SHA='${{ github.event.pull_request.base.sha }}'
          HEAD_SHA='${{ github.event.pull_request.head.sha }}'
          echo "BASE_SHA=$BASE_SHA"
          echo "HEAD_SHA=$HEAD_SHA"
          git fetch --no-tags --depth=1 origin "$BASE_SHA" "$HEAD_SHA"
          git diff --name-only "$BASE_SHA" "$HEAD_SHA" > changed_files.txt || true
          echo "Changed files:"; cat changed_files.txt || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps (backend)
        run: |
          NEED_BACKEND=0
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if grep -E '^(backend/|backend\\.pyproject\\.toml|backend/requirements\\.txt|backend/tests/)' changed_files.txt >/dev/null 2>&1; then
              NEED_BACKEND=1
            fi
          else
            NEED_BACKEND=1
          fi
          if [ "$NEED_BACKEND" = "1" ]; then
            python -m pip install --upgrade pip
            pip install -r backend/requirements.txt pytest
          else
            echo "No backend changes detected: skip backend deps"
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install frontend deps
        working-directory: frontend
        run: |
          npm install --no-fund --no-audit

      - name: Make guard scripts executable
        run: |
          chmod +x scripts/run_all_guards.sh || true
          chmod +x backend/scripts/run_guards.sh || true
          chmod +x frontend/scripts/guard_tl_board.sh || true

      - name: Backend guards (conditional)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && ! grep -E '^(backend/|backend\\.pyproject\\.toml|backend/requirements\\.txt|backend/tests/)' changed_files.txt >/dev/null 2>&1; then
            echo "No backend changes detected: skip backend guards"
          else
            bash backend/scripts/run_guards.sh
          fi

      - name: Frontend UI structural guard
        run: |
          ( cd frontend && ../frontend/scripts/guard_tl_board.sh )
