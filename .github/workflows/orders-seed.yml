name: Orders Seed
on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "PROMETEO base URL (Railway o locale)"
        required: true
jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Seed Orders
        env:
          BASE_URL: ${{ inputs.base_url }}
        run: |
          bash scripts/seed_orders.sh
