name: Postdeploy Smoke
on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "PROMETEO base URL (Railway o locale)"
        required: true
jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Smoke
        env:
          BASE_URL: ${{ inputs.base_url }}
        run: |
          bash scripts/smoke_postdeploy.sh
