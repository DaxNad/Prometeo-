name: Postdeploy Smoke

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL of the deployed app (e.g., https://your-app.railway.app)"
        required: true
        type: string

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run smoke tests against ${{ inputs.base_url }}
        env:
          BASE_URL: ${{ inputs.base_url }}
        run: |
          bash scripts/smoke_postdeploy.sh

