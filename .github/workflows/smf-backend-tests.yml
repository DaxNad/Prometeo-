name: SMF Backend Tests

on:
  pull_request:
  workflow_dispatch: {}

jobs:
  smf-backend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine changed files (PR)
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          BASE_SHA='${{ github.event.pull_request.base.sha }}'
          HEAD_SHA='${{ github.event.pull_request.head.sha }}'
          echo "BASE_SHA=$BASE_SHA"
          echo "HEAD_SHA=$HEAD_SHA"
          git fetch --no-tags --depth=1 origin "$BASE_SHA" "$HEAD_SHA"
          git diff --name-only "$BASE_SHA" "$HEAD_SHA" > changed_files.txt || true
          echo "Changed files:"; cat changed_files.txt || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          check-latest: true

      - name: Install dependencies (only if SMF/backend changed)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && ! grep -E '^(backend/app/smf/|backend/app/api_production\.py|backend/tests/test_smf_|backend/tests/test_production_order_smf_sync\.py|backend/tests/test_smoke_api\.py|backend/requirements\.txt|\.github/workflows/smf-backend-tests\.yml)' changed_files.txt >/dev/null 2>&1; then
            echo "No SMF/backend changes detected: passing no-op"
            exit 0
          fi
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt pytest

      - name: Run SMF/backend tests
        working-directory: backend
        env:
          SMF_BASE_PATH: /tmp/smf
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && ! grep -E '^(backend/app/smf/|backend/app/api_production\.py|backend/tests/test_smf_|backend/tests/test_production_order_smf_sync\.py|backend/tests/test_smoke_api\.py|backend/requirements\.txt|\.github/workflows/smf-backend-tests\.yml)' ../changed_files.txt >/dev/null 2>&1; then
            echo "No SMF/backend changes detected: passing no-op"
            exit 0
          else
            python -m pytest -q \
              tests/test_smoke_api.py \
              tests/test_smf_ingest.py \
              tests/test_smf_schema_guard.py \
              tests/test_smf_updater_warnings.py \
              tests/test_production_order_smf_sync.py
          fi

      - name: Publish legacy status context 'smf'
        if: ${{ github.event_name == 'pull_request' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA='${{ github.event.pull_request.head.sha }}'
          REPO='${{ github.repository }}'
          API="https://api.github.com/repos/${REPO}/statuses/${SHA}"
          DESC="SMF backend checks passed"
          TARGET_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "Publishing status to $API"
          curl -s -H "Authorization: Bearer $GH_TOKEN" \
               -H 'Accept: application/vnd.github+json' \
               -X POST "$API" \
               -d "{\"state\":\"success\",\"context\":\"smf\",\"description\":\"$DESC\",\"target_url\":\"$TARGET_URL\"}"
