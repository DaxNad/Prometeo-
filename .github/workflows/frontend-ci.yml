name: Frontend CI

on:
  pull_request:
  workflow_dispatch: {}

concurrency:
  group: frontend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine changed files (PR)
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          BASE_SHA='${{ github.event.pull_request.base.sha }}'
          HEAD_SHA='${{ github.event.pull_request.head.sha }}'
          echo "BASE_SHA=$BASE_SHA"
          echo "HEAD_SHA=$HEAD_SHA"
          git fetch --no-tags --depth=1 origin "$BASE_SHA" "$HEAD_SHA"
          git diff --name-only "$BASE_SHA" "$HEAD_SHA" > changed_files.txt || true
          echo "Changed files:"; cat changed_files.txt || true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies (only if frontend changed)
        working-directory: frontend
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && ! grep -E '^(frontend/|\.github/workflows/frontend-ci\.yml)' ../changed_files.txt >/dev/null 2>&1; then
            echo "No frontend changes detected: passing no-op"
            exit 0
          fi
          npm ci

      - name: Run tests
        working-directory: frontend
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && ! grep -E '^(frontend/|\.github/workflows/frontend-ci\.yml)' ../changed_files.txt >/dev/null 2>&1; then
            echo "No frontend changes detected: passing no-op"
            exit 0
          fi
          npm test -- --run

      - name: Build
        working-directory: frontend
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && ! grep -E '^(frontend/|\.github/workflows/frontend-ci\.yml)' ../changed_files.txt >/dev/null 2>&1; then
            echo "No frontend changes detected: passing no-op"
            exit 0
          fi
          npm run build
