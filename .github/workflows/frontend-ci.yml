name: Frontend CI

on:
  pull_request:
  workflow_dispatch: {}

concurrency:
  group: frontend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine changed files (PR)
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          git diff --name-only "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" > changed_files.txt || touch changed_files.txt
          echo "Changed files:"; cat changed_files.txt || true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            integrations/webhook/package-lock.json

      - name: Install & test frontend (only if frontend changed)
        working-directory: frontend
        run: |
          SHOULD_RUN=0
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if grep -E '^(frontend/)' ../changed_files.txt >/dev/null 2>&1; then
              SHOULD_RUN=1
            fi
          else
            SHOULD_RUN=1
          fi
          if [ "$SHOULD_RUN" = "1" ] && [ -f package.json ]; then
            npm ci
            npm test --if-present --silent
          else
            echo "No frontend changes detected: skip tests"
          fi

      - name: Build frontend (only if frontend changed)
        working-directory: frontend
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && ! grep -E '^(frontend/)' ../changed_files.txt >/dev/null 2>&1; then
            echo "No frontend changes detected: skip build"
            exit 0
          fi
          [ -f package.json ] && npm run build --if-present || true

      - name: Test integrations/webhook (only if changed)
        working-directory: integrations/webhook
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && ! grep -E '^(integrations/webhook/)' ../changed_files.txt >/dev/null 2>&1; then
            echo "No integrations/webhook changes detected: skip"
            exit 0
          fi
          [ -f package.json ] && npm ci && npm test --if-present --silent || true
