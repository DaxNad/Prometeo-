name: Frontend CI

on:
  pull_request:
    paths:
      - 'frontend/**'
      - 'frontend_legacy/**'
      - 'integrations/webhook/**'
      - '.github/workflows/frontend-ci.yml'
  workflow_dispatch: {}

jobs:
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            integrations/webhook/package-lock.json

      - name: Install & test frontend
        if: ${{ hashFiles('frontend/package.json') != '' }}
        working-directory: frontend
        run: |
          npm ci
          npm test --if-present --silent

      - name: Build frontend
        if: ${{ hashFiles('frontend/package.json') != '' }}
        working-directory: frontend
        run: |
          npm run build --if-present

      - name: Test integrations/webhook
        if: ${{ hashFiles('integrations/webhook/package.json') != '' }}
        working-directory: integrations/webhook
        run: |
          npm ci
          npm test --if-present --silent

