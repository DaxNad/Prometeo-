name: Temporary database registry push runner

on:
  push:
    branches:
      - fix/database-registry-pathless-context-source-001

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  run:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: backend
      PYTEST_ADDOPTS: -m "not e2e"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/database-registry-pathless-context-source-001
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt pytest

      - name: Extract and apply scoped patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          workflow = Path('.github/workflows/temp-database-registry-pathless-fix.yml').read_text(encoding='utf-8')
          start = "          python - <<'PY'\n"
          end = "          PY\n\n      - name: Run full repository guards"
          if start not in workflow or end not in workflow:
              raise SystemExit('embedded patch markers not found')
          body = workflow.split(start, 1)[1].split(end, 1)[0]
          lines = [line[10:] if line.startswith('          ') else line for line in body.splitlines()]
          Path('/tmp/pathless_registry_patch.py').write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY
          python /tmp/pathless_registry_patch.py

      - name: Run full repository guards
        shell: bash
        run: |
          set +e
          bash backend/scripts/run_guards.sh 2>&1 | tee /tmp/pathless-registry-guards.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            {
              echo 'PATHLESS_REGISTRY_GUARD_FAILURE'
              echo
              echo '```text'
              tail -n 220 /tmp/pathless-registry-guards.log
              echo '```'
            } > /tmp/pathless-registry-comment.md
            gh pr comment 487 --body-file /tmp/pathless-registry-comment.md
          fi
          exit "$status"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Commit clean final diff
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/temp-database-registry-pathless-fix.yml
          git rm .github/workflows/temp-database-registry-push-runner.yml
          git rm docs/capabilities/.DATABASE_REGISTRY_PATHLESS_TRIGGER
          git add \
            backend/app/services/context_source_reader_adapter.py \
            tools/context_source_reader_adapter.py \
            backend/tests/test_context_source_reader_adapter_readonly.py \
            backend/tests/test_context_source_reader_adapter_runtime_errors.py \
            docs/capabilities/DATABASE_REGISTRY_PATHLESS_CONTEXT_SOURCE_001.md
          git commit -m "fix(context): support pathless database registry sources"
          git push origin HEAD:fix/database-registry-pathless-context-source-001
