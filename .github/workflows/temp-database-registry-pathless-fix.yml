def test_database_registry_without_path_is_metadata_only(tmp_path):
    path = _write_index(
        tmp_path / "index.json",
        sources=[{
            "id": "customer_demand_registry",
            "kind": "database_registry",
            "structural_origin": "customer_demand",
            "access_mode": "read_only",
            "runtime_enabled": False,
            "allowed_for": ["future_governed_retrieval"],
            "exists": True,
        }],
    )

    result = read_context_source_index(path)

    assert result["rejected"] == []
    assert result["sources"] == [{
        "id": "customer_demand_registry",
        "kind": "database_registry",
        "tier": None,
        "authority": None,
        "role": None,
        "access_mode": "read_only",
        "runtime_enabled": False,
        "allowed_for": ["future_governed_retrieval"],
        "exists": True,
        "structural_origin": "customer_demand",
        "locator_mode": "logical_registry",
    }]


def test_database_registry_with_path_is_rejected(tmp_path):
    path = _write_index(
        tmp_path / "index.json",
        sources=[{
            "id": "bad_registry",
            "kind": "database_registry",
            "path": "memory/not-a-database-file.json",
            "access_mode": "read_only",
            "runtime_enabled": False,
            "allowed_for": ["future_governed_retrieval"],
        }],
    )

    result = read_context_source_index(path)
    assert result["sources"] == []
    assert result["rejected"] == [{"id": "bad_registry", "reason": "NON_FILE_SOURCE_PATH_FORBIDDEN"}]


def test_non_database_source_still_requires_governed_path(tmp_path):
    path = _write_index(
        tmp_path / "index.json",
        sources=[{
            "id": "missing_path_doc",
            "kind": "document",
            "access_mode": "read_only",
            "runtime_enabled": False,
            "allowed_for": ["future_governed_retrieval"],
        }],
    )

    result = read_context_source_index(path)
    assert result["rejected"] == [{"id": "missing_path_doc", "reason": "SOURCE_PATH_INVALID"}]
'''
