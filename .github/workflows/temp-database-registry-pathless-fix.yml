def _write_database_registry_index(repo_root: Path) -> Path:
    index = repo_root / "memory" / "context_source_index.json"
    index.parent.mkdir(parents=True)
    index.write_text(
        json.dumps({"sources": [{
            "id": "customer_demand_registry",
            "kind": "database_registry",
            "structural_origin": "customer_demand",
            "access_mode": "read_only",
            "runtime_enabled": False,
            "exists": True,
        }]}),
        encoding="utf-8",
    )
    return index


def test_runtime_adapter_database_registry_metadata_does_not_require_path(tmp_path):
    index = _write_database_registry_index(tmp_path)
    adapter = ContextSourceReaderAdapter(index_path=index, repo_root=tmp_path)

    result = adapter.read_metadata("customer_demand_registry")

    assert result.status == "METADATA_OK"
    assert result.content is None
    assert result.metadata["kind"] == "database_registry"
    assert result.metadata["relative_path"] is None
    assert result.metadata["locator_mode"] == "logical_registry"
    assert result.metadata["structural_origin"] == "customer_demand"
    assert result.metadata["runtime_enabled"] is False


def test_runtime_adapter_database_registry_excerpt_is_deterministically_unsupported(tmp_path):
    index = _write_database_registry_index(tmp_path)
    adapter = ContextSourceReaderAdapter(index_path=index, repo_root=tmp_path)

    with pytest.raises(ContextSourceReaderError) as exc_info:
        adapter.read_excerpt("customer_demand_registry")

    assert exc_info.value.code == "SOURCE_EXCERPT_UNSUPPORTED"
    assert str(tmp_path) not in str(exc_info.value)
'''
          if 'test_runtime_adapter_database_registry_metadata_does_not_require_path' not in text:
