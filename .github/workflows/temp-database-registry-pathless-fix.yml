name: Temporary database registry pathless fix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  patch-test-close:
    if: github.event.pull_request.head.ref == 'fix/database-registry-pathless-context-source-001'
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: backend
      PYTEST_ADDOPTS: -m "not e2e"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt pytest

      - name: Apply deterministic pathless-source contract
        shell: bash
        run: |
          python - <<'PY'
