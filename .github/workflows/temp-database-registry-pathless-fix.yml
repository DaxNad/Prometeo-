## Stato

- `CAPABILITY_STATUS`: `IMPLEMENTED`
- `IMPLEMENTATION_STATUS`: `COMPLETED`
- `RUNTIME_ACTIVATION`: `NO`
- `DATABASE_WRITE`: `NONE`

## Contratto consolidato

Una fonte con `kind: database_registry` è una fonte logica non filesystem.

- non richiede `path`;
- un `path` esplicito è rifiutato con `NON_FILE_SOURCE_PATH_FORBIDDEN`;
- il metadata reader restituisce `locator_mode: logical_registry`;
- il runtime adapter consente solo `read_metadata`;
- `read_excerpt` termina con `SOURCE_EXCERPT_UNSUPPORTED`;
- `runtime_enabled: false` resta obbligatorio;
- `access_mode: read_only` resta obbligatorio;
- nessun accesso database viene aggiunto da questa capability;
- nessuna fonte viene attivata automaticamente.

## Compatibilità preservata

Le fonti documentali e memory-file continuano a richiedere un path relativo governato sotto `docs/` o `memory/`. Traversal e prefissi vietati restano bloccati.

## Accettazione

La capability è chiusa quando il source index reale non rifiuta `customer_demand_registry`, i test file-based restano verdi e l'intera suite dei guard repository passa.
''', encoding='utf-8')
