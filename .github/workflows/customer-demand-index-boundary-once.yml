name: Customer Demand Index Boundary Once

on:
  push:
    branches:
      - feat/customer-demand-governance-runtime-alignment-001

permissions:
  contents: write

jobs:
  align:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Preserve metadata-only index and point to dedicated grant
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          path = Path('memory/context_source_index.json')
          payload = json.loads(path.read_text(encoding='utf-8'))
          matches = [s for s in payload['sources'] if s.get('id') == 'customer_demand_registry']
          if len(matches) != 1:
              raise SystemExit('customer_demand_registry must be unique')
          source = matches[0]
          source.update({
              'role': 'Metadata-only registration for the read-only customer-demand registry; executable authorization is held in context_source_runtime_authorizations.json.',
              'runtime_enabled': False,
              'allowed_for': ['runtime_authorization_registry', 'tl_chat_context_policy'],
              'expected_source_status': 'REGISTERED_METADATA_ONLY',
              'summary': 'Registrazione strutturale metadata-only; il binding TL Chat è autorizzato separatamente da un grant deny-by-default e verificato prima della query.',
          })
          path.write_text(json.dumps(payload, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY
          rm .github/workflows/customer-demand-index-boundary-once.yml
      - name: Commit boundary correction
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add memory/context_source_index.json .github/workflows/customer-demand-index-boundary-once.yml
          git commit -m "docs(context): preserve metadata-only source index boundary"
          git push
